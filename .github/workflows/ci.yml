name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    name: Detect changed parts
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            infra:
              - 'infra/**'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy.yml'

  backend:
    name: Backend
    runs-on: ubuntu-latest

    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: artist_portfolio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d artist_portfolio"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/artist_portfolio?sslmode=disable
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
      APP_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run migrations
        working-directory: backend
        run: go run ./cmd/migrate

      - name: Run backend tests
        working-directory: backend
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
          go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  caddy:
    name: Caddy
    runs-on: ubuntu-latest

    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Caddy image
        run: docker build -t li-polesh-caddy-ci ./infra/caddy

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/infra/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e DOMAIN=example.com \
            -e S3_BUCKET=test-bucket \
            -e S3_ENDPOINT=s3.example.com \
            li-polesh-caddy-ci \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest

    needs:
      - changes
      - backend
      - frontend
      - caddy

    if: ${{ always() }}

    steps:
      - name: Print result
        run: |
          echo "backend changed:  ${{ needs.changes.outputs.backend }}"
          echo "frontend changed: ${{ needs.changes.outputs.frontend }}"
          echo "infra changed:    ${{ needs.changes.outputs.infra }}"
          echo "backend result:   ${{ needs.backend.result }}"
          echo "frontend result:  ${{ needs.frontend.result }}"
          echo "caddy result:     ${{ needs.caddy.result }}"

          if [ "${{ needs.backend.result }}" = "failure" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || \
             [ "${{ needs.caddy.result }}" = "failure" ]; then
            exit 1
          fi

          if [ "${{ needs.backend.result }}" = "cancelled" ] || \
             [ "${{ needs.frontend.result }}" = "cancelled" ] || \
             [ "${{ needs.caddy.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.changes.outputs.backend }}" != "true" ] && \
             [ "${{ needs.changes.outputs.frontend }}" != "true" ] && \
             [ "${{ needs.changes.outputs.infra }}" != "true" ]; then
            echo "Only docs or unrelated files changed. Backend and frontend checks skipped."
          fi
