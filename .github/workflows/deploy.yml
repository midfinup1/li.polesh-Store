name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - rollback
      rollback_sha:
        description: "Commit SHA for rollback. Required only for rollback."
        required: false
        default: ""

  push:
    branches:
      - main

jobs:
  changes:
    name: Detect changed parts
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: read
      pull-requests: read

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            infra:
              - 'infra/**'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/deploy.yml'

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest

    needs: changes
    if: ${{ github.event_name == 'push' && needs.changes.outputs.backend == 'true' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/midfinup1/li-polesh-store-backend:latest
            ghcr.io/midfinup1/li-polesh-store-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest

    needs: changes
    if: ${{ github.event_name == 'push' && needs.changes.outputs.frontend == 'true' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_SITE_URL=https://lipolesh.art
            NEXT_IMAGE_REMOTE_HOSTS=s3.twcstorage.ru,3mjjbew73k.cdn.twcstorage.ru
          tags: |
            ghcr.io/midfinup1/li-polesh-store-frontend:latest
            ghcr.io/midfinup1/li-polesh-store-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-summary:
    name: Build summary
    runs-on: ubuntu-latest

    needs:
      - changes
      - build-backend
      - build-frontend

    if: ${{ always() && github.event_name == 'push' }}

    steps:
      - name: Print result
        run: |
          echo "backend changed:  ${{ needs.changes.outputs.backend }}"
          echo "frontend changed: ${{ needs.changes.outputs.frontend }}"
          echo "infra changed:    ${{ needs.changes.outputs.infra }}"
          echo "backend build:    ${{ needs.build-backend.result }}"
          echo "frontend build:   ${{ needs.build-frontend.result }}"

          if [ "${{ needs.build-backend.result }}" = "failure" ] || [ "${{ needs.build-frontend.result }}" = "failure" ]; then
            exit 1
          fi

          if [ "${{ needs.changes.outputs.backend }}" != "true" ] && \
             [ "${{ needs.changes.outputs.frontend }}" != "true" ]; then
            echo "No Docker image changes detected. Nothing to build."
          fi

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/li-polesh-store

            git fetch origin main
            git reset --hard origin/main

            echo "Creating database backup before deploy..."
            ./scripts/backup-postgres.sh

            echo "Pull latest images..."
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml pull

            echo "Restart production services..."
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml ps

  rollback:
    name: Rollback VPS
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback' }}

    steps:
      - name: Check rollback SHA
        run: |
          if [ -z "${{ github.event.inputs.rollback_sha }}" ]; then
            echo "rollback_sha is required for rollback"
            exit 1
          fi

      - name: Rollback over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/li-polesh-store

            ROLLBACK_SHA="${{ github.event.inputs.rollback_sha }}"

            echo "Rollback to SHA: $ROLLBACK_SHA"

            echo "Creating database backup before rollback..."
            ./scripts/backup-postgres.sh

            echo "Pull rollback images..."
            docker pull ghcr.io/midfinup1/li-polesh-store-backend:$ROLLBACK_SHA
            docker pull ghcr.io/midfinup1/li-polesh-store-frontend:$ROLLBACK_SHA

            echo "Retag rollback images as local latest..."
            docker tag ghcr.io/midfinup1/li-polesh-store-backend:$ROLLBACK_SHA ghcr.io/midfinup1/li-polesh-store-backend:latest
            docker tag ghcr.io/midfinup1/li-polesh-store-frontend:$ROLLBACK_SHA ghcr.io/midfinup1/li-polesh-store-frontend:latest

            echo "Restart services with rollback images..."
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml up -d --remove-orphans