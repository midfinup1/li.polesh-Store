name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/midfinup1/li-polesh-store-backend:latest
            ghcr.io/midfinup1/li-polesh-store-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_SITE_URL=https://lipolesh.art
          tags: |
            ghcr.io/midfinup1/li-polesh-store-frontend:latest
            ghcr.io/midfinup1/li-polesh-store-frontend:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-images

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/li-polesh-store
            git fetch origin main
            git reset --hard origin/main
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml pull
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml up -d
            docker image prune -f
            docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml ps