x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env.prod
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app

  frontend:
    image: ghcr.io/midfinup1/li-polesh-store-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.prod
    environment:
      API_INTERNAL_URL: http://backend:8080/api/v1
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - app

  migrate:
    image: ghcr.io/midfinup1/li-polesh-store-backend:${IMAGE_TAG:-latest}
    restart: "no"
    logging: *default-logging
    command: ["/app/migrate"]
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  telegram-proxy:
    image: alpine:3.20
    restart: unless-stopped
    logging: *default-logging
    command: >
      sh -c "
        apk add --no-cache openssh-client &&
        mkdir -p /root/.ssh &&
        cp /run/secrets/telegram_tunnel_key /root/.ssh/id_ed25519 &&
        chmod 600 /root/.ssh/id_ed25519 &&
        ssh -i /root/.ssh/id_ed25519
          -N
          -D 0.0.0.0:1080
          root@78.17.86.10
          -o ExitOnForwardFailure=yes
          -o ServerAliveInterval=30
          -o ServerAliveCountMax=3
          -o IdentitiesOnly=yes
          -o StrictHostKeyChecking=no
      "
    secrets:
      - telegram_tunnel_key
    networks:
      - app

  backend:
    image: ghcr.io/midfinup1/li-polesh-store-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      telegram-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/api/v1/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

secrets:
  telegram_tunnel_key:
    file: /home/deploy/.ssh/li_polesh_github_actions

networks:
  app:
    driver: bridge